.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.irow{display:flex;gap:8px;margin-bottom:7px;align-items:center}

// ── DOM HELPERS ────────────────────────────────────────────────────────────
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k]);}
    else if(k==="className"){e.className=props[k];}
    else if(k.startsWith("on")&&typeof props[k]==="function"){e.addEventListener(k.slice(2).toLowerCase(),props[k]);}
    else{try{e[k]=props[k];}catch(ex){}}
  });
  if(children!==undefined&&children!==null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else if(c instanceof Node)e.appendChild(c);
    });
  }
  return e;
}
function div(style,children){
  var e=document.createElement("div");
  if(style&&typeof style==="object"){Object.assign(e.style,style);}
  if(children!==undefined&&children!==null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else if(c instanceof Node)e.appendChild(c);
    });
  }
  return e;
}
function btn(cls,txt,fn,extraStyle){
  var b=el("button",{className:"btn "+cls,onClick:fn},txt);
  if(extraStyle)Object.assign(b.style,extraStyle);
  return b;
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function getWeekDates(){
  var today=new Date(),day=today.getDay(),sun=new Date(today);
  sun.setDate(today.getDate()-day);
  return DAYS.map(function(_,i){var d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fmtWeek(dates){
  return "Week of "+dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})+" - "+dates[6].toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
}
function colorMap(){
  var m={},i=0;
  Object.values(plan).filter(Boolean).forEach(function(n){if(!m[n])m[n]=COLORS[i++%COLORS.length];});
  return m;
}
function plannedMeals(){
  var seen={},out=[];
  Object.values(plan).filter(Boolean).forEach(function(n){if(!seen[n]){seen[n]=1;out.push(n);}});
  return out;
}
function filteredMeals(){
  return Object.keys(meals).filter(function(n){
    var v=meals[n];
    return (activeTag==="all"||(v.tags||[]).indexOf(activeTag)>=0)&&(!search||n.toLowerCase().indexOf(search.toLowerCase())>=0);
  }).sort(function(a,b){return a.localeCompare(b);});
}
function buildCombined(pm,cm){
  var map={};
  pm.forEach(function(name){
    (meals[name]&&meals[name].ingredients||[]).forEach(function(ing){
      if(ing.item.toLowerCase().indexOf("leftover")>=0)return;
      var key=name+"::"+ing.item,ov=overrides[key];
      if(ov&&ov.deleted)return;
      var di=ov?ov.item:ing.item,dq=ov?ov.qty:ing.qty;
      if(!map[di])map[di]={qty:dq,sources:[name],key:key};
      else{map[di].qty+=" + "+dq;map[di].sources.push(name);}
    });
  });
  extras.forEach(function(e){
    var key="extra::"+e.id;
    if(!map[e.item])map[e.item]={qty:e.qty,sources:[e.staple?"Staples":"Added manually"],key:key};
    else{map[e.item].qty+=" + "+e.qty;map[e.item].sources.push(e.staple?"Staples":"Added manually");}
  });
  return map;
}

// ── SYNC ───────────────────────────────────────────────────────────────────
function setSyncBadge(cls,txt){syncCls=cls;syncTxt=txt;render();}
async function saveToSheets(){
  if(!scriptUrl){activeTab="setup";render();return;}
  setSyncBadge("warn","Saving...");
  var custom={};Object.keys(meals).forEach(function(k){if(meals[k].custom)custom[k]=meals[k];});
  try{
    await fetch(scriptUrl,{method:"POST",body:JSON.stringify({plan:plan,checked:checked,overrides:overrides,extras:extras,custom:custom})});
    setSyncBadge("ok","Synced "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
  }catch(e){setSyncBadge("err","Sync failed");}
}
async function loadFromSheets(url){
  var u=url||scriptUrl;if(!u)return;
  setSyncBadge("warn","Loading...");
  try{
    var res=await fetch(u+"?t="+Date.now());
    var txt=await res.text();
    if(!txt||txt==="{}"||txt===""){setSyncBadge("ok","Connected - no data yet");return;}
    var d=JSON.parse(txt);
    if(d.plan)plan=d.plan;
    if(d.checked)checked=d.checked;
    if(d.overrides)overrides=d.overrides;
    if(d.extras)extras=d.extras;
    if(d.custom)Object.assign(meals,d.custom);
    setSyncBadge("ok","Loaded "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    render();
  }catch(e){setSyncBadge("err","Load failed - check Setup");}
}

          tags:(d.tags||[]).filter(function(t){return t!=="custom";}).join(", "),
          recipe:d.recipe||"",
          ings:d.ingredients?d.ingredients.map(function(i){return {item:i.item,qty:i.qty};}): [{item:"",qty:""}]};
        formErr="";render();
      },{background:"none",border:"1px solid #2e7d32",color:"#2e7d32",fontSize:"12px",padding:"4px 10px"}));
      if(isCustom){
        right.appendChild(btn("btn","Delete",function(){
          delete meals[name];
          Object.keys(plan).forEach(function(d){if(plan[d]===name)delete plan[d];});
          render();
        },{background:"none",border:"1px solid #e53935",color:"#e53935",fontSize:"12px",padding:"4px 10px"}));
        right.appendChild(el("span",{style:{background:"#e3f2fd",color:"#1565c0",borderRadius:"12px",padding:"2px 8px",fontSize:"11px",fontWeight:700}},"Custom"));
      }
      if(isRec)right.appendChild(el("span",{style:{background:"#fff3e0",color:"#e65100",borderRadius:"12px",padding:"2px 8px",fontSize:"11px",fontWeight:700}},"Rec"));
      inner.appendChild(right);
      card.appendChild(inner);
    }
    wrap.appendChild(card);
  });
  return wrap;
}

// ── RECOMMENDED ────────────────────────────────────────────────────────────
function renderDiscover(){
  var wrap=div(null);
  wrap.appendChild(el("p",{style:{fontSize:"13px",color:"#555",marginBottom:"16px"}},"Top picks — healthy, budget-friendly, matched to your flavor preferences."));
  Object.entries(meals).filter(function(e){return (e[1].tags||[]).indexOf("recommended")>=0;}).forEach(function(entry){
    var name=entry[0],data=entry[1];
    var card=div({background:"white",borderRadius:"10px",padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderLeft:"4px solid #e65100",marginBottom:"12px"});
    var inner=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px"});
    var left=div({flex:1});
    left.appendChild(el("div",{style:{fontWeight:700,fontSize:"15px",marginBottom:"4px"}},name));
    left.appendChild(el("div",{style:{fontSize:"12px",color:"#666",marginBottom:"6px"}},"⏱ "+data.time+" · 💰 $"+data.cost+" · 👥 serves "+data.serves));
    var tgs=div({display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"6px"});
    (data.tags||[]).filter(function(t){return t!=="recommended";}).forEach(function(t){
      tgs.appendChild(el("span",{style:{background:"#f0f7f0",color:"#2e7d32",borderRadius:"12px",padding:"2px 8px",fontSize:"11px",fontWeight:600}},t));
    });
    left.appendChild(tgs);
    left.appendChild(el("div",{style:{fontSize:"12px",color:"#777"}},[el("strong",null,"Ingredients: "),document.createTextNode(data.ingredients.map(function(i){return i.item;}).join(", "))]));
    inner.appendChild(left);
    if(data.recipe)inner.appendChild(el("a",{href:data.recipe,target:"_blank",className:"btn",style:{background:"#e65100",color:"white",whiteSpace:"nowrap",flexShrink:0,textDecoration:"none"}},"📖 Recipe"));
    card.appendChild(inner);
    wrap.appendChild(card);
  });
  return wrap;
}

// ── COSTCO ─────────────────────────────────────────────────────────────────
function renderCostco(){
  var wrap=div(null);
  wrap.appendChild(div({background:"#e8f5e9",borderRadius:"10px",padding:"12px 16px",marginBottom:"14px",borderLeft:"4px solid #2e7d32",fontSize:"13px",color:"#333",lineHeight:"1.8"},
    "🏪 Costco Non-Perishable Bulk Buys — shelf-stable, high-value items used across almost every meal you cook."));
  COSTCO_ITEMS.forEach(function(section){
    var card=div({background:"white",borderRadius:"10px",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:"14px"});
    card.appendChild(div({background:"#2e7d32",color:"white",padding:"10px 16px",fontWeight:700,fontSize:"14px"},section.category));
    section.items.forEach(function(it,i){
      var row=div({display:"flex",alignItems:"flex-start",padding:"10px 16px",borderBottom:i<section.items.length-1?"1px solid #f5f5f5":"none",gap:"12px"});
      var left=div({flex:1});
      left.appendChild(el("div",{style:{fontSize:"14px",fontWeight:600,color:"#222"}},it.item));
      left.appendChild(el("div",{style:{fontSize:"12px",color:"#777",marginTop:"2px"}},"Used in: "+it.why));
      row.appendChild(left);
      row.appendChild(el("span",{style:{background:"#e8f5e9",color:"#2e7d32",borderRadius:"12px",padding:"2px 10px",fontSize:"11px",fontWeight:700,flexShrink:0,marginTop:"2px"}},"Bulk Buy"));
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
  wrap.appendChild(div({background:"#fff8e1",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#666",lineHeight:"1.8"},
    "💡 Pro tip: Skip fresh produce, dairy, and meat at Costco unless you have freezer space. Focus on pantry staples — save $150-200/month vs Safeway."));
  return wrap;
}

// ── SETUP ──────────────────────────────────────────────────────────────────
function renderSetup(){
  var wrap=div(null);
  var box=div({background:"#e3f2fd",borderRadius:"10px",padding:"16px",marginBottom:"16px",borderLeft:"4px solid #1565c0"});
  box.appendChild(el("h3",{style:{color:"#1565c0",fontSize:"14px",marginBottom:"10px"}},"🔗 Connect to Google Sheets — Step by Step"));
  var ol=el("ol",{style:{paddingLeft:"18px",fontSize:"13px",color:"#333",lineHeight:"2.2"}});
  ["Go to sheets.google.com → create a new blank spreadsheet → name it Family Meal Planner",
   "Click Extensions → Apps Script",
   "Delete all code → paste the script below → click Save",
   "Click Deploy → New Deployment → Web App → Who has access: Anyone → Deploy",
   "Copy the Web App URL → paste below → click Connect"].forEach(function(s){ol.appendChild(el("li",null,s));});
  box.appendChild(ol);
  var pre=el("pre",{style:{background:"#1a237e",color:"#e8eaf6",borderRadius:"8px",padding:"12px",fontSize:"11px",lineHeight:"1.6",overflowX:"auto",marginTop:"10px",whiteSpace:"pre-wrap"}});
  pre.textContent="const SHEET_NAME = 'Plan';\n\nfunction doGet(e) {\n  var ss = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);\n  var data = sheet.getRange(1,1,1,1).getValue();\n  return ContentService.createTextOutput(data || '{}').setMimeType(ContentService.MimeType.JSON);\n}\n\nfunction doPost(e) {\n  var ss = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);\n  sheet.getRange(1,1,1,1).setValue(e.postData.contents);\n  return ContentService.createTextOutput('ok').setMimeType(ContentService.MimeType.TEXT);\n}";
  box.appendChild(pre);
  var urlrow=div({display:"flex",gap:"8px",marginTop:"12px",flexWrap:"wrap",alignItems:"center"});
  var ui=el("input",{type:"url",className:"inp",value:scriptUrl,placeholder:"Paste your Web App URL here..."});ui.style.flex="1";ui.style.minWidth="200px";
  ui.addEventListener("input",function(e){scriptUrl=e.target.value;});
  urlrow.appendChild(ui);
  urlrow.appendChild(btn("btn g","Connect",function(){
    if(!scriptUrl.trim())return;
    localStorage.setItem("mpUrl",scriptUrl.trim());
    loadFromSheets(scriptUrl.trim());
  }));
  box.appendChild(urlrow);
  if(scriptUrl)box.appendChild(el("p",{style:{fontSize:"12px",marginTop:"8px",color:"#2e7d32"}},"✅ URL saved. Auto-refreshes every 60 seconds."));
  wrap.appendChild(box);
  wrap.appendChild(div({className:"card",fontSize:"13px",lineHeight:"1.9",color:"#555"},[
    el("strong",null,"📱 Share with your partner: "),
    document.createTextNode("Save this file as index.html → drag onto "),
    el("a",{href:"https://netlify.com",target:"_blank",style:{color:"#2e7d32"}},"netlify.com"),
    document.createTextNode(" → share the URL. Changes either of you save sync through your Google Sheet.")
  ]));
  return wrap;
}

// ── MAIN RENDER ────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  var content;
  if(activeTab==="planner")content=renderPlanner();
  else if(activeTab==="rotation")content=renderRotation();
  else if(activeTab==="groceries")content=renderGroceries();
  else if(activeTab==="mymenu")content=renderMenu();
  else if(activeTab==="discover")content=renderDiscover();
  else if(activeTab==="costco")content=renderCostco();
  else content=renderSetup();
  app.appendChild(content);
}

window.addEventListener("DOMContentLoaded",function(){
  render();
  if(scriptUrl)loadFromSheets();
  else setSyncBadge("warn","Go to Setup tab to connect");
  setInterval(function(){if(scriptUrl)loadFromSheets();},60000);
});
</script>
</body>
