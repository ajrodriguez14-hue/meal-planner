<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f0;min-height:100vh;padding:16px;max-width:960px;margin:0 auto}
a{text-decoration:none}
.btn{padding:8px 16px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:13px;display:inline-block;text-decoration:none;transition:opacity .15s;text-align:center}
.btn:hover{opacity:.85}
.g{background:#2e7d32;color:white!important}
.r{background:#e53935;color:white!important}
.o{background:white;color:#2e7d32;border:1.5px solid #2e7d32}
.gr{background:#eee;color:#333}
.or{background:#e65100;color:white!important}
.pur{background:#6a1b9a;color:white!important}
.card{background:white;border-radius:14px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #ddd;font-size:13px;box-sizing:border-box;background:#fafafa;transition:border .15s}
.inp:focus{border-color:#2e7d32;outline:none;background:white}
.einp{padding:6px 9px;border-radius:8px;border:1.5px solid #ccc;font-size:12px;box-sizing:border-box}
.tag{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.tabs{display:flex;background:white;border-radius:14px 14px 0 0;border-bottom:2px solid #e8f5e9;margin-bottom:16px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab{padding:12px 13px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;border-bottom:3px solid transparent;color:#777;white-space:nowrap;transition:all .15s}
.tab.active{border-bottom:3px solid #2e7d32;color:#2e7d32;background:#f9fff9}
.vt{display:flex;background:#f5f5f5;border-radius:10px;overflow:hidden;padding:3px;gap:3px}
.vbtn{padding:6px 14px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#555;border-radius:8px;transition:all .15s}
.vbtn.on{background:white;color:#2e7d32;box-shadow:0 1px 4px rgba(0,0,0,.12)}
label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.irow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.ing-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid #f0f0f0;gap:8px}
.ing-row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.hero{background:linear-gradient(135deg,#1b5e20,#2e7d32,#388e3c);color:white;border-radius:16px;padding:20px 24px;margin-bottom:18px;box-shadow:0 4px 16px rgba(46,125,50,.3)}
@media(max-width:500px){.g3{grid-template-columns:1fr 1fr}}
</style>

function setSyncBadge(cls,txt){ syncCls=cls; syncTxt=txt; render(); }

async function saveToSheets(){
  if(!scriptUrl){ activeTab="setup"; render(); return; }
  setSyncBadge("warn","Saving...");
  var custom={};
  Object.keys(meals).forEach(function(k){ if(meals[k].custom) custom[k]=meals[k]; });
  try{
    await fetch(scriptUrl,{method:"POST",body:JSON.stringify({plan:plan,checked:checked,overrides:overrides,extras:extras,custom:custom})});
    isDirty=false;
    setSyncBadge("ok","Synced "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
  }catch(e){ setSyncBadge("err","Sync failed — check connection"); }
}

async function loadFromSheets(silent){
  if(!scriptUrl){ if(!silent) setSyncBadge("warn","Not connected"); return; }
  // CRITICAL FIX: never overwrite unsaved changes during auto-refresh
  if(silent && isDirty){
    setSyncBadge("warn","Unsaved changes — hit Save & Sync");
    return;
  }
  if(!silent) setSyncBadge("warn","Loading...");
  try{
    var res=await fetch(scriptUrl+"?t="+Date.now());
    var txt=await res.text();
    if(!txt||txt==="{}"||txt===""){
      setSyncBadge("ok","Connected — no data yet");
      return;
    }
    var d=JSON.parse(txt);
    if(d.plan)    plan=d.plan;
    if(d.checked) checked=d.checked;
    if(d.overrides) overrides=d.overrides;
    if(d.extras)  extras=d.extras;
    if(d.custom)  Object.assign(meals,d.custom);
    isDirty=false;
    setSyncBadge("ok","Loaded "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    render();
  }catch(e){ setSyncBadge("err","Load failed — check Setup tab"); }
}

// DOM HELPERS
// ─────────────────────────────────────────────
function mk(tag,props,children){
  var e=document.createElement(tag);
  if(props) Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){ Object.assign(e.style,props[k]); }
    else if(k==="cls"){ e.className=props[k]; }
    else if(k==="on"){ Object.keys(props[k]).forEach(function(ev){ e.addEventListener(ev,props[k][ev]); }); }
    else{ e.setAttribute(k,props[k]); }
  });
  if(children!==undefined&&children!==null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
    });
  }
  return e;
}
function dv(sty,ch){ var e=mk("div",{}); if(sty) Object.assign(e.style,sty); if(ch){ (Array.isArray(ch)?ch:[ch]).forEach(function(c){ if(c&&c instanceof Node) e.appendChild(c); else if(typeof c==="string") e.appendChild(document.createTextNode(c)); }); } return e; }
function bt(label,cls,fn,xsty){
  var b=mk("button",{cls:"btn "+(cls||""),on:{click:fn}},label);
  if(xsty) Object.assign(b.style,xsty);
  return b;
}
// THE ONE TRUE ANCHOR BUILDER — guaranteed to work
function anchor(label,href,cls,xsty){
  var a=document.createElement("a");
  a.href=href;
  a.target="_blank";
  a.rel="noopener noreferrer";
  a.className="btn "+(cls||"");
  a.textContent=label;
  if(xsty) Object.assign(a.style,xsty);
  return a;
}
function txt(s){ return document.createTextNode(s); }

function fmtDate(d){ return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }

function colorMap(){
  var m={},i=0;
  Object.values(plan).filter(Boolean).forEach(function(n){ if(!m[n]) m[n]=COLORS[i++%COLORS.length]; });
  return m;
}
function plannedMeals(){
  var seen={},out=[];
  Object.values(plan).filter(Boolean).forEach(function(n){ if(!seen[n]){ seen[n]=1; out.push(n); } });
  return out;
}
function filteredMeals(){
  return Object.keys(meals).filter(function(n){
    var v=meals[n];
    return (activeTag==="all"||(v.tags||[]).indexOf(activeTag)>=0)&&(!srch||n.toLowerCase().indexOf(srch.toLowerCase())>=0);
  }).sort(function(a,b){ return a.localeCompare(b); });
}
function buildCombined(pm,cm){
  var map={};
  pm.forEach(function(name){
    (meals[name]&&meals[name].ingredients||[]).forEach(function(ing){
      if(ing.item.toLowerCase().indexOf("leftover")>=0) return;
      var key=name+"::"+ing.item, ov=overrides[key];
      if(ov&&ov.deleted) return;
      var di=ov?ov.item:ing.item, dq=ov?ov.qty:ing.qty;
      if(!map[di]) map[di]={qty:dq,sources:[name],key:key};
      else{ map[di].qty+=" + "+dq; map[di].sources.push(name); }
    });
  });
  extras.forEach(function(e){
    var key="extra::"+e.id;
    if(!map[e.item]) map[e.item]={qty:e.qty,sources:[e.staple?"Staples":"Added manually"],key:key};
    else{ map[e.item].qty+=" + "+e.qty; map[e.item].sources.push(e.staple?"Staples":"Added manually"); }
  });
  return map;
}
function stapleOn(s){ return extras.some(function(e){ return e.staple&&e.item.toLowerCase()===s.toLowerCase(); }); }

      if(data.ings.length>1){
        var rb=mk("button",{style:{background:"none",border:"none",color:"#e53935",cursor:"pointer",fontSize:"18px",flexShrink:"0"},on:{click:function(){ data.ings=data.ings.filter(function(_,j){ return j!==i; }); rebuildIngs(); }}},"✕");
        r.appendChild(rb);
      }
      rows.appendChild(r);
    });
    ingWrap.appendChild(rows);
  }
  rebuildIngs();
  ingWrap.appendChild(bt("+ Add Ingredient","o",function(){ data.ings.push({item:"",qty:""}); rebuildIngs(); },{fontSize:"13px",marginTop:"8px"}));
  grid.appendChild(ingWrap);
  wrap.appendChild(grid);
  if(formErr) wrap.appendChild(mk("p",{style:{color:"#e53935",fontSize:"13px",marginTop:"10px"}},formErr));

  var btns=dv({display:"flex",gap:"10px",marginTop:"16px"});
  btns.appendChild(bt(isEdit?"Save Changes":"Save Meal","g",function(){
    formErr="";
    if(!data.name.trim()){ formErr="Please enter a meal name."; render(); return; }
    if(!isEdit&&meals[data.name.trim()]){ formErr="Name already exists."; render(); return; }
    if(isEdit&&data.name.trim()!==editingMeal&&meals[data.name.trim()]){ formErr="Name already exists."; render(); return; }
    var ings=data.ings.filter(function(r){ return r.item.trim(); });
    if(!ings.length){ formErr="Add at least one ingredient."; render(); return; }
    var tags=data.tags?data.tags.split(",").map(function(t){ return t.trim().toLowerCase(); }).filter(Boolean):[];
    var isCustom=isEdit?!!meals[editingMeal].custom:true;
    if(isCustom&&tags.indexOf("custom")<0) tags.push("custom");
    var updated={tags:tags,time:data.time||"—",serves:Number(data.serves)||4,cost:parseFloat(data.cost)||0,recipe:data.recipe||null,ingredients:ings};
    if(isCustom) updated.custom=true;
    if(isEdit){
      meals[data.name.trim()]=Object.assign({},meals[editingMeal]||{},updated);
      if(data.name.trim()!==editingMeal){ delete meals[editingMeal]; Object.keys(plan).forEach(function(d){ if(plan[d]===editingMeal) plan[d]=data.name.trim(); }); }
      editingMeal=null; editMealData=null;
    } else {
      meals[data.name.trim()]=updated;
      showAddForm=false;
      newMealData={name:"",time:"",serves:"",cost:"",tags:"",recipe:"",ings:[{item:"",qty:""}]};
    }
    markDirty(); render();
  }));
  btns.appendChild(bt("Cancel","gr",function(){
    if(isEdit){ editingMeal=null; editMealData=null; } else { showAddForm=false; newMealData={name:"",time:"",serves:"",cost:"",tags:"",recipe:"",ings:[{item:"",qty:""}]}; }
    formErr=""; render();
  }));
  wrap.appendChild(btns);
  return wrap;
}

// ─────────────────────────────────────────────
// MY MENU
// ─────────────────────────────────────────────
function renderMenu(){
  var wrap=dv(null);
  wrap.appendChild(dv({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"},[
    mk("p",{style:{fontSize:"13px",color:"#888"}},"All your meals. Edit or add new ones anytime."),
    bt("+ Add Meal","g",function(){ showAddForm=true; formErr=""; render(); })
  ]));
  if(showAddForm) wrap.appendChild(mealForm(false));
  Object.entries(meals).forEach(function(entry){
    var name=entry[0], data=entry[1];
    var isCustom=data.custom, isRec=Object.prototype.hasOwnProperty.call(REC_MEALS,name);
    var card=dv({background:"white",borderRadius:"12px",padding:"13px 16px",boxShadow:"0 1px 5px rgba(0,0,0,.07)",marginBottom:"9px",borderLeft:"4px solid "+(isCustom?"#1565c0":isRec?"#e65100":"#c8e6c9")});
    if(editingMeal===name&&editMealData){
      card.appendChild(mealForm(true));
    } else {
      var inner=dv({display:"flex",justifyContent:"space-between",alignItems:"flex-start"});
      var left=dv({flex:"1"});
      left.appendChild(mk("div",{style:{fontWeight:"700",fontSize:"14px",color:"#222"}},name));
      left.appendChild(mk("div",{style:{fontSize:"12px",color:"#999",marginTop:"3px",lineHeight:"1.6"}},"⏱ "+data.time+" · 💰 $"+data.cost+" · 👥 "+data.serves));
      if(data.recipe){
        var rl=document.createElement("a");
        rl.href=data.recipe; rl.target="_blank"; rl.rel="noopener noreferrer";
        rl.style.cssText="font-size:12px;color:#2e7d32;text-decoration:none;font-weight:700;display:inline-block;margin-top:3px";
        rl.textContent="📖 View Recipe →";
        left.appendChild(rl);
      }
      inner.appendChild(left);
      var right=dv({display:"flex",gap:"6px",alignItems:"center",flexShrink:"0",flexWrap:"wrap",justifyContent:"flex-end"});
      right.appendChild(bt("✏️ Edit","",function(){
        editingMeal=name;
        var d=meals[name];
        editMealData={name:name,time:d.time||"",serves:String(d.serves||4),cost:String(d.cost||""),
          tags:(d.tags||[]).filter(function(t){ return t!=="custom"; }).join(", "),
          recipe:d.recipe||"",
          ings:d.ingredients?d.ingredients.map(function(i){ return {item:i.item,qty:i.qty}; }):[{item:"",qty:""}]};
        formErr=""; render();
      },{background:"none",border:"1px solid #2e7d32",color:"#2e7d32",fontSize:"12px",padding:"4px 10px"}));
      if(isCustom){
        right.appendChild(bt("🗑 Delete","",function(){
          if(confirm("Delete "+name+"?")){ delete meals[name]; Object.keys(plan).forEach(function(d){ if(plan[d]===name) delete plan[d]; }); markDirty(); render(); }
        },{background:"none",border:"1px solid #e53935",color:"#e53935",fontSize:"12px",padding:"4px 10px"}));
        right.appendChild(mk("span",{style:{background:"#e3f2fd",color:"#1565c0",borderRadius:"12px",padding:"3px 9px",fontSize:"11px",fontWeight:"700"}},"Custom"));
      }
      if(isRec) right.appendChild(mk("span",{style:{background:"#fff3e0",color:"#e65100",borderRadius:"12px",padding:"3px 9px",fontSize:"11px",fontWeight:"700"}},"Rec"));
      inner.appendChild(right);
      card.appendChild(inner);
    }
    wrap.appendChild(card);
  });
  return wrap;
}

// ─────────────────────────────────────────────
// PICKS / DISCOVER  — fully rebuilt, no broken helpers
// ─────────────────────────────────────────────
function renderDiscover(){
  var wrap=dv(null);

  // ── RANDOM DISCOVERY ───────────────────────
  var rCard=dv({background:"linear-gradient(135deg,#4a148c,#6a1b9a)",color:"white",borderRadius:"14px",padding:"22px",marginBottom:"20px",boxShadow:"0 4px 16px rgba(74,20,140,.3)"});
  rCard.appendChild(mk("div",{style:{fontSize:"28px",marginBottom:"8px"}},"🎲"));
  rCard.appendChild(mk("div",{style:{fontWeight:"800",fontSize:"18px",marginBottom:"6px"}},"Random Recipe Discovery"));
  rCard.appendChild(mk("div",{style:{fontSize:"13px",opacity:".8",marginBottom:"18px"}},"Click any button to browse real recipes from that site in a new tab — a different page every visit."));
  var rbRow=dv({display:"flex",flexWrap:"wrap",gap:"10px"});
  RECIPE_SITES.forEach(function(site){
    var b=document.createElement("button");
    b.className="btn";
    b.textContent=site.i+" "+site.n;
    Object.assign(b.style,{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.35)",color:"white",fontSize:"13px",padding:"8px 16px",borderRadius:"10px",fontWeight:"700",cursor:"pointer"});
    b.addEventListener("click",function(){ window.open(site.browse,"_blank"); });
    b.addEventListener("mouseenter",function(){ b.style.background="rgba(255,255,255,.28)"; });
    b.addEventListener("mouseleave",function(){ b.style.background="rgba(255,255,255,.15)"; });
    rbRow.appendChild(b);
  });
  rCard.appendChild(rbRow);
  wrap.appendChild(rCard);

  // ── SEARCH ─────────────────────────────────
  var sCard=dv({background:"white",borderRadius:"14px",padding:"18px",boxShadow:"0 2px 8px rgba(0,0,0,.08)",marginBottom:"18px"});
  sCard.appendChild(mk("div",{style:{fontWeight:"700",fontSize:"15px",color:"#222",marginBottom:"5px"}},"🔍 Search Real Recipes"));
  sCard.appendChild(mk("div",{style:{fontSize:"12px",color:"#888",marginBottom:"14px"}},"Type a dish or ingredient, then click a site to search it directly."));
  var si=mk("input",{cls:"inp",placeholder:"e.g. chicken teriyaki, salmon bowl, enchiladas..."});
  si.style.marginBottom="14px";
  sCard.appendChild(si);
  var sgrid=dv({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(175px,1fr))",gap:"10px"});
  RECIPE_SITES.forEach(function(site){
    var card=dv({background:"#fafafa",borderRadius:"12px",padding:"12px 14px",border:"1.5px solid #eee",cursor:"pointer",transition:"all .15s",borderLeft:"4px solid "+site.c});
    card.appendChild(mk("div",{style:{fontWeight:"700",fontSize:"13px",color:"#222",marginBottom:"3px"}},site.i+" "+site.n));
    card.appendChild(mk("div",{style:{fontSize:"11px",color:"#888",marginBottom:"10px"}},site.d));
    var sb=document.createElement("button");
    sb.className="btn";
    sb.textContent="Search →";
    Object.assign(sb.style,{fontSize:"11px",padding:"5px 14px",background:site.c,color:"white",width:"100%",borderRadius:"8px",cursor:"pointer"});
    sb.addEventListener("click",function(){
      var q=si.value.trim()||"easy dinner";
      window.open(site.search(q),"_blank");
    });
    card.addEventListener("mouseenter",function(){ card.style.boxShadow="0 4px 12px rgba(0,0,0,.12)"; card.style.transform="translateY(-2px)"; });
    card.addEventListener("mouseleave",function(){ card.style.boxShadow="none"; card.style.transform="none"; });
    card.appendChild(sb);
    sgrid.appendChild(card);
  });
  sCard.appendChild(sgrid);
  wrap.appendChild(sCard);

  // ── CURATED PICKS ──────────────────────────
  wrap.appendChild(mk("div",{style:{fontWeight:"700",fontSize:"15px",color:"#333",marginBottom:"14px"}},"⭐ Curated Picks — Add to Your Menu"));
  Object.entries(REC_MEALS).forEach(function(entry){
    var name=entry[0], data=entry[1];
    var inMenu=!!meals[name];
    var card=dv({background:"white",borderRadius:"14px",padding:"16px 18px",boxShadow:"0 2px 8px rgba(0,0,0,.08)",borderLeft:"5px solid #e65100",marginBottom:"14px"});
    card.addEventListener("mouseenter",function(){ card.style.boxShadow="0 4px 14px rgba(0,0,0,.12)"; });
    card.addEventListener("mouseleave",function(){ card.style.boxShadow="0 2px 8px rgba(0,0,0,.08)"; });
    var top=dv({display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px"});
    var left=dv({flex:"1"});
    left.appendChild(mk("div",{style:{fontWeight:"700",fontSize:"15px",marginBottom:"5px",color:"#222"}},name));
    left.appendChild(mk("div",{style:{fontSize:"12px",color:"#888",marginBottom:"8px"}},"⏱ "+data.time+" · 💰 $"+data.cost+" · 👥 serves "+data.serves));
    var tgs=dv({display:"flex",flexWrap:"wrap",gap:"5px",marginBottom:"8px"});
    (data.tags||[]).forEach(function(t){
      tgs.appendChild(mk("span",{style:{background:"#f1f8e9",color:"#558b2f",borderRadius:"20px",padding:"3px 10px",fontSize:"11px",fontWeight:"700"}},t));
    });
    left.appendChild(tgs);
    left.appendChild(mk("div",{style:{fontSize:"12px",color:"#aaa"}},[mk("strong",{style:{color:"#666"}},"Ingredients: "),txt(data.ingredients.map(function(i){ return i.item; }).join(", "))]));
    top.appendChild(left);

    var rb=dv({display:"flex",flexDirection:"column",gap:"8px",flexShrink:"0",minWidth:"115px"});

    // RECIPE LINK — built directly, no helper function
    if(data.recipe){
      var rl=document.createElement("a");
      rl.href=data.recipe;
      rl.target="_blank";
      rl.rel="noopener noreferrer";
      rl.className="btn";
      rl.style.cssText="background:#e65100;color:white;text-decoration:none;text-align:center;font-size:13px;display:block;border-radius:10px;padding:8px 16px;font-weight:700;cursor:pointer";
      rl.textContent="📖 View Recipe";
      rb.appendChild(rl);
    }

    // ADD TO MENU BUTTON
    var addBtn=document.createElement("button");
    addBtn.className="btn "+(inMenu?"gr":"g");
    addBtn.textContent=inMenu?"✓ In Menu":"+ Add to Menu";
    addBtn.style.cssText="text-align:center;font-size:13px;cursor:"+(inMenu?"default":"pointer")+";border-radius:10px;padding:8px 16px;font-weight:700";
    addBtn.addEventListener("click",function(){
      if(!meals[name]){
        var copy=JSON.parse(JSON.stringify(data));
        meals[name]=copy;
        markDirty(); render();
      }
    });
    rb.appendChild(addBtn);
    top.appendChild(rb);
    card.appendChild(top);
    wrap.appendChild(card);
  });
  return wrap;
}

// ─────────────────────────────────────────────
// COSTCO
// ─────────────────────────────────────────────
function renderCostco(){
  var wrap=dv(null);
  wrap.appendChild(dv({background:"linear-gradient(135deg,#e8f5e9,#f1f8f1)",borderRadius:"14px",padding:"14px 18px",marginBottom:"16px",borderLeft:"4px solid #2e7d32",fontSize:"13px",color:"#444",lineHeight:"1.8"},
    "🏪 Costco Non-Perishable Bulk Buys — skip produce, dairy and meat unless you have freezer space. Focus on pantry staples — save $150-200/month vs Safeway."));
  COSTCO_ITEMS.forEach(function(section){
    var card=dv({background:"white",borderRadius:"14px",overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.08)",marginBottom:"16px"});
    card.appendChild(dv({background:"linear-gradient(135deg,#2e7d32,#388e3c)",color:"white",padding:"11px 18px",fontWeight:"700",fontSize:"14px"},section.cat));
    section.items.forEach(function(it,i){
      var row=dv({display:"flex",alignItems:"flex-start",padding:"11px 18px",borderBottom:i<section.items.length-1?"1px solid #f0f0f0":"none",gap:"12px"});
      var left=dv({flex:"1"});
      left.appendChild(mk("div",{style:{fontSize:"14px",fontWeight:"600",color:"#222"}},it.i));
      left.appendChild(mk("div",{style:{fontSize:"12px",color:"#999",marginTop:"3px"}},"Used in: "+it.w));
      row.appendChild(left);
      row.appendChild(mk("span",{style:{background:"#e8f5e9",color:"#2e7d32",borderRadius:"12px",padding:"3px 12px",fontSize:"11px",fontWeight:"700",flexShrink:"0",marginTop:"2px"}},"Bulk Buy"));
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
  return wrap;
}

// ─────────────────────────────────────────────
// SETUP
// ─────────────────────────────────────────────
function renderSetup(){
  var wrap=dv(null);
  var box=dv({background:"#e3f2fd",borderRadius:"14px",padding:"18px",marginBottom:"16px",borderLeft:"4px solid #1565c0"});
  box.appendChild(mk("h3",{style:{color:"#1565c0",fontSize:"15px",marginBottom:"12px"}},"🔗 Connect to Google Sheets"));
  var ol=mk("ol",{style:{paddingLeft:"20px",fontSize:"13px",color:"#333",lineHeight:"2.4"}});
  ["Go to sheets.google.com → create a new spreadsheet → name it Family Meal Planner",
   "Click Extensions → Apps Script",
   "Delete all code → paste the script below → Save",
   "Deploy → New Deployment → Web App → Who has access: Anyone → Deploy",
   "Copy the Web App URL → paste below → click Connect"].forEach(function(s){ ol.appendChild(mk("li",{},s)); });
  box.appendChild(ol);
  var pre=mk("pre",{style:{background:"#1a237e",color:"#e8eaf6",borderRadius:"10px",padding:"14px",fontSize:"11px",lineHeight:"1.7",overflowX:"auto",marginTop:"12px",whiteSpace:"pre-wrap"}});
  pre.textContent="const SHEET_NAME = 'Plan';\n\nfunction doGet(e) {\n  var ss = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);\n  var data = sheet.getRange(1,1,1,1).getValue();\n  return ContentService.createTextOutput(data || '{}').setMimeType(ContentService.MimeType.JSON);\n}\n\nfunction doPost(e) {\n  var ss = SpreadsheetApp.getActiveSpreadsheet();\n  var sheet = ss.getSheetByName(SHEET_NAME) || ss.insertSheet(SHEET_NAME);\n  sheet.getRange(1,1,1,1).setValue(e.postData.contents);\n  return ContentService.createTextOutput('ok').setMimeType(ContentService.MimeType.TEXT);\n}";
  box.appendChild(pre);
  var urlrow=dv({display:"flex",gap:"8px",marginTop:"14px",flexWrap:"wrap",alignItems:"center"});
  var ui=mk("input",{cls:"inp",type:"url",value:scriptUrl,placeholder:"Paste your Web App URL here...",on:{input:function(e){ scriptUrl=e.target.value; }}});
  ui.style.flex="1"; ui.style.minWidth="200px";
  urlrow.appendChild(ui);
  urlrow.appendChild(bt("Connect ✓","g",function(){
    if(!scriptUrl.trim()) return;
    localStorage.setItem("mpUrl",scriptUrl.trim());
    loadFromSheets(false);
  }));
  box.appendChild(urlrow);
  if(scriptUrl) box.appendChild(mk("p",{style:{fontSize:"12px",marginTop:"10px",color:"#1565c0",fontWeight:"600"}},"✅ URL saved. Partner loads the same URL and pastes this same script URL to sync."));
  wrap.appendChild(box);
  return wrap;
}

// ─────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────
function render(){
  var root=document.getElementById("root");
  while(root.firstChild) root.removeChild(root.firstChild);
  root.appendChild(renderHeader());
  root.appendChild(renderTabs());
  var content;
  switch(activeTab){
    case "planner":   content=renderPlanner(); break;
    case "rotation":  content=renderRotation(); break;
    case "groceries": content=renderGroceries(); break;
    case "mymenu":    content=renderMenu(); break;
    case "discover":  content=renderDiscover(); break;
    case "costco":    content=renderCostco(); break;
    default:          content=renderSetup();
  }
  root.appendChild(content);
}

window.addEventListener("DOMContentLoaded",function(){
  render();
  if(scriptUrl) loadFromSheets(false);
  else setSyncBadge("warn","Go to Setup tab to connect");
  // auto-refresh every 60s — ONLY if no unsaved changes
  setInterval(function(){ if(scriptUrl) loadFromSheets(true); },60000);
});
</script>
