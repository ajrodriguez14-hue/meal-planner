<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>Family Meal Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f0;min-height:100vh;padding:16px;max-width:960px;margin:0 auto}
.btn{padding:8px 16px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:13px;display:inline-block;text-decoration:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.g{background:#2e7d32;color:white}.r{background:#e53935;color:white}
.o{background:white;color:#2e7d32;border:1.5px solid #2e7d32}
.gr{background:#eee;color:#333}.or{background:#e65100;color:white}
.pur{background:#6a1b9a;color:white}
.card{background:white;border-radius:14px;padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:12px}
.inp{width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid #ddd;font-size:13px;box-sizing:border-box;background:#fafafa;transition:border .15s}
.inp:focus{border-color:#2e7d32;outline:none;background:white}
.einp{padding:6px 9px;border-radius:8px;border:1.5px solid #ccc;font-size:12px;box-sizing:border-box}
.tag{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.tabs{display:flex;background:white;border-radius:14px 14px 0 0;border-bottom:2px solid #e8f5e9;margin-bottom:16px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab{padding:12px 13px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;border-bottom:3px solid transparent;color:#777;white-space:nowrap;transition:all .15s}
.tab.active{border-bottom:3px solid #2e7d32;color:#2e7d32;background:#f9fff9}
.vt{display:flex;background:#f5f5f5;border-radius:10px;overflow:hidden;padding:3px;gap:3px}
.vbtn{padding:6px 14px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:#555;border-radius:8px;transition:all .15s}
.vbtn.on{background:white;color:#2e7d32;box-shadow:0 1px 4px rgba(0,0,0,.12)}
label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:5px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.irow{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.section-hdr{color:white;padding:10px 18px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.ing-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid #f0f0f0;gap:8px;transition:background .1s}
.ing-row:last-child{border-bottom:none}
.ing-row:hover{background:#fafff8}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.pill{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700}
.badge-ok{background:#c8e6c9;color:#1b5e20}
.badge-warn{background:#fff9c4;color:#5d4037}
.badge-err{background:#ffcdd2;color:#7f0000}
.hero{background:linear-gradient(135deg,#1b5e20 0%,#2e7d32 50%,#388e3c 100%);color:white;border-radius:16px;padding:20px 24px;margin-bottom:18px;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.day-row{background:white;border-radius:12px;padding:11px 16px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:9px;border-left:5px solid #e0e0e0;transition:box-shadow .15s}
.day-row:hover{box-shadow:0 2px 10px rgba(0,0,0,.1)}
select{flex:1;padding:8px 12px;border-radius:10px;border:1.5px solid #ddd;font-size:13px;background:white;cursor:pointer}
select:focus{border-color:#2e7d32;outline:none}
.rot-card{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:18px;border:2px solid transparent;transition:border .2s}
.rot-card.loaded{border:2px solid #2e7d32}
.rec-card{background:white;border-radius:14px;padding:16px 18px;box-shadow:0 2px 8px rgba(0,0,0,.08);border-left:5px solid #e65100;margin-bottom:14px;transition:box-shadow .15s}
.rec-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.menu-row{background:white;border-radius:12px;padding:13px 16px;box-shadow:0 1px 5px rgba(0,0,0,.07);margin-bottom:9px;transition:box-shadow .15s}
.menu-row:hover{box-shadow:0 2px 10px rgba(0,0,0,.1)}
.info{background:#fff8e1;border-radius:10px;padding:11px 16px;font-size:12px;color:#666;margin-bottom:14px;border-left:4px solid #ffc107}
.staple-panel{background:white;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
.random-card{background:linear-gradient(135deg,#4a148c,#6a1b9a);color:white;border-radius:14px;padding:20px;margin-bottom:16px;text-align:center}
@media(max-width:500px){.g3{grid-template-columns:1fr 1fr}.hero{padding:14px 16px}}
</style>

// ── DOM HELPERS ────────────────────────────────────────────────────────────
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.keys(props).forEach(function(k){
    if(k==="style"&&typeof props[k]==="object"){Object.assign(e.style,props[k]);}
    else if(k==="className"){e.className=props[k];}
    else if(k==="href"){e.setAttribute("href",props[k]);}
    else if(k==="target"){e.setAttribute("target",props[k]);}
    else if(k==="rel"){e.setAttribute("rel",props[k]);}
    else if(k==="type"){e.setAttribute("type",props[k]);}
    else if(k.startsWith("on")&&typeof props[k]==="function"){e.addEventListener(k.slice(2).toLowerCase(),props[k]);}
    else{try{e[k]=props[k];}catch(ex){}}
  });
  if(children!==undefined&&children!==null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else if(c instanceof Node)e.appendChild(c);
    });
  }
  return e;
}
function div(style,children){
  var e=document.createElement("div");
  if(style&&typeof style==="object"){Object.assign(e.style,style);}
  if(children!==undefined&&children!==null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c===null||c===undefined||c===false)return;
      if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
      else if(c instanceof Node)e.appendChild(c);
    });
  }
  return e;
}
function btn(cls,txt,fn,sty){
  var b=el("button",{className:"btn "+cls,onClick:fn},txt);
  if(sty)Object.assign(b.style,sty);
  return b;
}
function link(txt,href,cls,sty){
  var a=el("a",{className:"btn "+(cls||""),href:href,target:"_blank",rel:"noopener noreferrer"},txt);
  if(sty)Object.assign(a.style,sty);
  return a;
}

function getWeekDates(){
  var today=new Date(),day=today.getDay(),sun=new Date(today);
  sun.setDate(today.getDate()-day);
  return DAYS.map(function(_,i){var d=new Date(sun);d.setDate(sun.getDate()+i);return d;});
}
function fmtDate(d){return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function fmtWeek(dates){return "Week of "+dates[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})+" – "+dates[6].toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});}
function colorMap(){var m={},i=0;Object.values(plan).filter(Boolean).forEach(function(n){if(!m[n])m[n]=COLORS[i++%COLORS.length];});return m;}
function plannedMeals(){var seen={},out=[];Object.values(plan).filter(Boolean).forEach(function(n){if(!seen[n]){seen[n]=1;out.push(n);}});return out;}
function filteredMeals(){
  return Object.keys(meals).filter(function(n){
    var v=meals[n];
    return (activeTag==="all"||(v.tags||[]).indexOf(activeTag)>=0)&&(!search||n.toLowerCase().indexOf(search.toLowerCase())>=0);
  }).sort(function(a,b){return a.localeCompare(b);});
}
function buildCombined(pm,cm){
  var map={};
  pm.forEach(function(name){
    (meals[name]&&meals[name].ingredients||[]).forEach(function(ing){
      if(ing.item.toLowerCase().indexOf("leftover")>=0)return;
      var key=name+"::"+ing.item,ov=overrides[key];
      if(ov&&ov.deleted)return;
      var di=ov?ov.item:ing.item,dq=ov?ov.qty:ing.qty;
      if(!map[di])map[di]={qty:dq,sources:[name],key:key};
      else{map[di].qty+=" + "+dq;map[di].sources.push(name);}
    });
  });
  extras.forEach(function(e){
    var key="extra::"+e.id;
    if(!map[e.item])map[e.item]={qty:e.qty,sources:[e.staple?"Staples":"Added manually"],key:key};
    else{map[e.item].qty+=" + "+e.qty;map[e.item].sources.push(e.staple?"Staples":"Added manually");}
  });
  return map;
}
function stapleAlreadyAdded(s){
  return extras.some(function(e){return e.staple&&e.item.toLowerCase()===s.toLowerCase();});
}
function addStaple(s){
  if(!stapleAlreadyAdded(s)){
    extras.push({id:Date.now().toString()+"_"+Math.random().toString(36).slice(2),item:s,qty:"1",staple:true});
  }
  render();
}
function removeStapleFromList(s){
  extras=extras.filter(function(e){return !(e.staple&&e.item.toLowerCase()===s.toLowerCase());});
  render();
}
function removeStapleFromQuickPick(cat,s){
  STAPLE_CATEGORIES[cat]=STAPLE_CATEGORIES[cat].filter(function(x){return x!==s;});
  extras=extras.filter(function(e){return !(e.staple&&e.item.toLowerCase()===s.toLowerCase());});
  render();
}

function setSyncBadge(cls,txt){syncCls=cls;syncTxt=txt;render();}
async function saveToSheets(){
  if(!scriptUrl){activeTab="setup";render();return;}
  setSyncBadge("warn","Saving...");
  var custom={};Object.keys(meals).forEach(function(k){if(meals[k].custom)custom[k]=meals[k];});
  try{
    await fetch(scriptUrl,{method:"POST",body:JSON.stringify({plan:plan,checked:checked,overrides:overrides,extras:extras,custom:custom})});
    setSyncBadge("ok","Synced "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
  }catch(e){setSyncBadge("err","Sync failed");}
}
async function loadFromSheets(url){
  var u=url||scriptUrl;if(!u)return;
  setSyncBadge("warn","Loading...");
  try{
    var res=await fetch(u+"?t="+Date.now());
    var txt=await res.text();
    if(!txt||txt==="{}"||txt===""){setSyncBadge("ok","Connected — no data yet");return;}
    var d=JSON.parse(txt);
    if(d.plan)plan=d.plan;
    if(d.checked)checked=d.checked;
    if(d.overrides)overrides=d.overrides;
    if(d.extras)extras=d.extras;
    if(d.custom)Object.assign(meals,d.custom);
    setSyncBadge("ok","Loaded "+new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}));
    render();
  }catch(e){setSyncBadge("err","Load failed — check Setup");}
}

   "Delete all code → paste the script below → click Save",

  box.appendChild(pre);

  var ui=el("input",{className:"inp",value:scriptUrl,placeholder:"Paste your Web App URL here..."});
  ui.setAttribute("type","url");ui.style.flex="1";ui.style.minWidth="200px";
  ui.addEventListener("input",function(e){scriptUrl=e.target.value;});
  urlrow.appendChild(ui);
  urlrow.appendChild(btn("btn g","Connect ✓",function(){if(!scriptUrl.trim())return;localStorage.setItem("mpUrl",scriptUrl.trim());loadFromSheets(scriptUrl.trim());}));

// ── MAIN RENDER ────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  while(app.firstChild)app.removeChild(app.firstChild);
  app.appendChild(renderHeader());
  app.appendChild(renderTabs());
  var content;
  if(activeTab==="planner")content=renderPlanner();
  else if(activeTab==="rotation")content=renderRotation();
  else if(activeTab==="groceries")content=renderGroceries();
  else if(activeTab==="mymenu")content=renderMenu();
  else if(activeTab==="discover")content=renderDiscover();
  else if(activeTab==="costco")content=renderCostco();
  else content=renderSetup();
  app.appendChild(content);
}

window.addEventListener("DOMContentLoaded",function(){
  render();
  if(scriptUrl)loadFromSheets();
  else setSyncBadge("warn","Go to Setup tab to connect");
  setInterval(function(){if(scriptUrl)loadFromSheets();},60000);
});
</script>
